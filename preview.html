<style>
  .rea-wrapper {
    --max-red:    #C8102E;
    --max-red-dk: #96081F;
    --max-dark:   #2d2d2d;
    --max-grey:   #f7f7f7;
    --max-border: #e0e0e0;
    font-family: 'Nunito Sans', sans-serif;
    max-width: 1120px; margin: 0 auto; color: var(--max-dark);
  }
  .rea-wrapper h1, .rea-wrapper h2, .rea-wrapper h3,
  .rea-wrapper .rea-title, .rea-wrapper .rea-price-val {
    font-family: 'Poppins', sans-serif;
  }

  /* ── Filtry ── */
  .rea-filters {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    margin-bottom: 12px; padding: 16px 20px;
    background: var(--max-grey); border: 1px solid var(--max-border);
  }
  .rea-filters label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: .4px; }
  .rea-filters select {
    display: block; margin-top: 5px; padding: 7px 12px;
    border: 1px solid #ccc; border-radius: 0; font-size: 13px;
    font-family: 'Nunito Sans', sans-serif; background: #fff;
    cursor: pointer; min-width: 130px;
  }
  .rea-filters select:focus { outline: 2px solid var(--max-red); }
  .rea-filters input[type=range] { display: block; margin-top: 8px; width: 180px; cursor: pointer; accent-color: var(--max-red); }
  .rea-price-label { font-size: 13px; color: var(--max-dark); margin-top: 5px; font-weight: 600; }
  .rea-reset-btn {
    padding: 8px 18px; background: var(--max-dark); color: #fff;
    border: none; cursor: pointer; font-size: 13px;
    font-family: 'Nunito Sans', sans-serif; font-weight: 600;
    border-radius: 0; transition: background .2s;
  }
  .rea-reset-btn:hover { background: var(--max-red); }

  /* ── Aktivní filtry ── */
  .rea-active-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; min-height: 4px; }
  .rea-filter-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; background: var(--max-dark); color: #fff;
    font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .rea-filter-chip:hover { background: var(--max-red); }

  /* ── Tabs ── */
  .rea-tabs { display: flex; margin-bottom: 20px; border-bottom: 3px solid var(--max-red); }
  .rea-tab {
    padding: 10px 26px; border: none; cursor: pointer;
    font-size: 14px; font-weight: 700; font-family: 'Poppins', sans-serif;
    background: #fff; color: #888; border-radius: 0;
    transition: all .15s; border-bottom: 3px solid transparent; margin-bottom: -3px;
  }
  .rea-tab.active  { background: var(--max-red); color: #fff; border-bottom-color: var(--max-red); }
  .rea-tab:hover:not(.active) { background: #f5f5f5; color: var(--max-dark); }

  /* ── Stats ── */
  .rea-stats { font-size: 13px; color: #777; margin-bottom: 16px; }
  .rea-stats strong { color: var(--max-red); }

  /* ── City info banner ── */
  #rea-city-banner {
    display: none;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 14px;
    color: #222;
    line-height: 1.7;
    margin: 10px 0 18px;
  }
  #rea-city-banner a { color: var(--max-red); text-decoration: none; }
  #rea-city-banner a:hover { text-decoration: underline; }

  /* ── Sort + stats řádek ── */
  .rea-statsort-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
  .rea-sort-row { display:flex; align-items:center; gap:6px; font-family:'Nunito Sans',sans-serif; font-size:13px; color:#555; }
  .rea-sort-row label { margin:0; font-size:13px; color:#555; }
  .rea-sort-row select { font-family:'Nunito Sans',sans-serif; font-size:13px; padding:4px 8px; border:1px solid #ddd; border-radius:0; color:#333; background:#fff; cursor:pointer; }

  /* ── Sekce pod výpisem ── */
  .rea-below-section { margin-top:48px; font-family:'Nunito Sans',sans-serif; font-size:14px; color:#222; line-height:1.7; }
  .rea-below-section h4 { font-family:'Poppins',sans-serif; font-size:15px; font-weight:700; color:#111; margin:0 0 10px; letter-spacing:.2px; }
  .rea-below-section h2 { font-family:'Poppins',sans-serif; font-size:18px; font-weight:700; color:#111; margin:0 0 14px; letter-spacing:.2px; }
  .rea-below-section p { margin:6px 0; font-size:14px; font-family:'Nunito Sans',sans-serif; color:#222; line-height:1.7; }
  .rea-below-section .rea-note { font-size:12px; color:#999; margin-top:8px; }
  .rea-city-compare-grid { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
  .rea-city-compare-item { padding:8px 14px; background:#f9f9f9; border-left:3px solid #ddd; min-width:150px; }
  .rea-city-compare-item.rea-current { border-left-color:var(--max-red); background:#fff5f6; }
  .rea-city-compare-item a { color:#222; text-decoration:none; font-size:12px; }
  .rea-city-compare-item a:hover { color:var(--max-red); }
  .rea-city-compare-item strong { display:block; font-size:15px; margin-top:2px; }
  .rea-yield-bar { display:flex; gap:6px; align-items:center; margin:6px 0 10px; }
  .rea-yield-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }

  /* ── Grid ── */
  .rea-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }

  /* ── Karta ── */
  .rea-card {
    background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 0;
    border: 1px solid var(--max-border); border-radius: 0; position: relative;
    transition: box-shadow .2s, border-color .2s;
  }
  .rea-card:hover { box-shadow: 0 6px 24px rgba(200,16,46,.10); border-color: var(--max-red); }
  .rea-card.sold  { background: #fafafa; opacity: .85; }

  /* Score badge */
  .rea-score-badge {
    display: inline-block; margin-bottom: 12px; padding: 4px 12px;
    font-size: 12px; font-weight: 700; font-family: 'Poppins', sans-serif;
    border-radius: 0; align-self: flex-start; letter-spacing: .3px;
  }
  .rea-score-badge.good { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
  .rea-score-badge.avg  { background: #fff3e0; color: #e65100; border-left: 3px solid #e65100; }
  .rea-score-badge.bad  { background: #fce4ec; color: #c62828; border-left: 3px solid #c62828; }
  .rea-score-badge.sold-badge { background: #f5f5f5; color: #757575; border-left: 3px solid #bdbdbd; }
  .rea-opportunity-badge {
    display: inline-block; margin-bottom: 8px; padding: 3px 10px;
    font-size: 11px; font-weight: 700; font-family: 'Poppins', sans-serif;
    letter-spacing: .3px; background: #fff8e1; color: #f57f17;
    border-left: 3px solid #f9a825; border-radius: 0;
  }

  /* Hlavička karty — badge vlevo, datum vpravo */
  .rea-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .rea-card-badges { display: flex; flex-direction: column; align-items: flex-start; }
  .rea-scraped     { font-size: 11px; color: #ccc; white-space: nowrap; margin-left: 8px; padding-top: 3px; }

  /* Název */
  .rea-title { font-size: 15px; font-weight: 700; color: var(--max-dark); margin: 0 0 14px; line-height: 1.4; font-family: 'Poppins', sans-serif; }

  /* Info řádky */
  .rea-info { width: 100%; margin-bottom: 14px; }
  .rea-info-row { display: flex; align-items: baseline; padding: 3px 0; background: none; border: none; }
  .rea-lbl { color: var(--max-dark); width: 38%; flex-shrink: 0; font-size: 13px; font-weight: 600; }
  .rea-val { color: var(--max-dark); font-weight: 600; font-size: 13px; }
  .rea-info-row.rea-price-row .rea-val { font-size: 18px; font-weight: 700; color: var(--max-red); font-family: 'Poppins', sans-serif; }
  .rea-info-row.rea-pm2-row .rea-val   { color: #777; font-weight: 400; font-size: 12px; }
  .rea-median { color: #aaa; font-size: 11px; font-weight: 400; }

  .rea-extras { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
  .rea-tag {
    font-size: 11px; padding: 3px 10px; font-weight: 600;
    cursor: pointer; border-radius: 0; border: none;
    background: #fff3e0; color: #bf360c;
    transition: opacity .15s, transform .1s;
  }
  .rea-tag:hover      { opacity: .75; transform: translateY(-1px); }
  .rea-tag.active-tag { outline: 2px solid var(--max-red); opacity: 1; }

  /* CTA */
  .rea-link {
    display: block; margin-top: auto; padding: 11px 18px;
    background: var(--max-red); color: #fff !important; border-radius: 0;
    font-size: 13px; font-weight: 700; font-family: 'Poppins', sans-serif;
    text-decoration: none !important; text-align: center; letter-spacing: .4px; transition: background .2s;

  .rea-link.sold-link       { background: #9e9e9e; }
  .rea-link.sold-link:hover { background: #757575; }

  /* Stavy */
  .rea-loading, .rea-empty, .rea-error {

  .rea-error   { color: var(--max-red); }
  .rea-updated { font-size: 12px; color: #bbb; text-align: right; margin-top: 20px; }
</style>

  // ── Informační banner o městu ────────────────────────────────────────────
  function renderCityInfo() {
    if (!window.REA_DEFAULT_CITY) return;
    const el = document.getElementById("rea-city-banner");
    if (!el) return;
    const cityName = window.REA_DEFAULT_CITY;
    const info = CITY_INFO[cityName];
    if (!info) return;

    const pfx = cityName.toLowerCase();
    const typeFilter = window.REA_DEFAULT_TYPE || null;

    const cityListings  = activeListings.filter(l => (l.locality_city || "").toLowerCase().startsWith(pfx));
    const typeListings  = typeFilter ? cityListings.filter(l => l.type === typeFilter) : cityListings;

    function median(arr) {
      if (!arr.length) return 0;
      const s = [...arr].sort((a, b) => a - b);
      return s[Math.floor(s.length / 2)];
    }

    const cityPrices = typeListings.map(l => l.price_per_m2).filter(p => p > 0);
    const natPrices  = activeListings.map(l => l.price_per_m2).filter(p => p > 0);
    const cityMed    = median(cityPrices);
    const natMed     = median(natPrices);

    let priceScale = "";
    if (cityMed > 0 && natMed > 0) {
      const r = (cityMed - natMed) / natMed;
      if      (r >  0.25) priceScale = "velký nadprůměr";
      else if (r >  0.10) priceScale = "nadprůměr";
      else if (r > -0.10) priceScale = "průměr";
      else if (r > -0.25) priceScale = "podprůměr";
      else                priceScale = "velký podprůměr";
    }

    const h = info.hap;
    let hapScale = "";
    if      (h >= 7.5) hapScale = "velký nadprůměr";
    else if (h >= 7.1) hapScale = "nadprůměr";
    else if (h >= 6.6) hapScale = "průměr";
    else if (h >= 6.0) hapScale = "podprůměr";
    else               hapScale = "velký podprůměr";

    let s = `<strong>${cityName}</strong> je ${info.rankCZ}. největší město ČR`;
    if (info.rankKraj > 0 && info.krajLoc) {
      s += ` a ${info.rankKraj}. největší v ${info.krajLoc}`;
    }
    s += ` (cca ${info.pop.toLocaleString("cs-CZ")} obyvatel).`;

    if (cityMed > 0) {
      const typeStr = typeFilter === "byt" ? "bytů" : typeFilter === "dům" ? "domů" : "nemovitostí";
      s += ` Průměrná cena ${typeStr} dle aktuálních inzerátů: <strong>${Math.round(cityMed).toLocaleString("cs-CZ")} Kč/m²</strong>`;
      if (priceScale) s += ` (${priceScale} oproti ČR)`;
      s += `.`;
    }

    s += ` Index spokojenosti obyvatel: <strong>${h.toFixed(1).replace(".", ",")}/10</strong> (${hapScale}`;
    if (info.hapCmp && info.hapSlug) {
      s += `, podobně jako v <a href="/real/${info.hapSlug}/">${info.hapCmp}</a>`;
    }
    s += `).`;

    el.innerHTML = s;
    el.style.display = "block";
  }

  // ── Srovnání cen okolních měst ───────────────────────────────────────────
  function renderNeighborCompare() {
    if (!window.REA_DEFAULT_CITY) return;
    const el = document.getElementById("rea-city-compare");
    if (!el) return;
    const cityName = window.REA_DEFAULT_CITY;
    const neighbors = CITY_NEIGHBORS[cityName];
    if (!neighbors || !neighbors.length) return;

    function cityMedianPm2(name) {
      const pfx = name.toLowerCase();
      const prices = activeListings
        .filter(l => (l.locality_city||"").toLowerCase().startsWith(pfx))
        .map(l => l.price_per_m2).filter(p => p > 0).sort((a,b) => a-b);
      if (!prices.length) return null;
      return prices[Math.floor(prices.length / 2)];
    }

    const results = [];
    const currentMed = cityMedianPm2(cityName);
    if (currentMed) results.push({ name: cityName, med: currentMed, isCurrent: true });
    for (const n of neighbors) {
      const med = cityMedianPm2(n);
      if (med) results.push({ name: n, med, isCurrent: false });
    }
    if (results.length < 2) return;
    results.sort((a, b) => a.med - b.med);

    let html = `<h2>Srovnání okolních měst</h2>`;
    html += `<div class="rea-city-compare-grid">`;
    for (const r of results) {
      const slug = slugify(r.name === "Praha" ? "Praha" : r.name);
      const cls  = r.isCurrent ? " rea-current" : "";
      const link = r.isCurrent
        ? `<span style="font-size:12px;color:#999;">${r.name} (tato stránka)</span>`
        : `<a href="/real/${slug}/">${r.name}</a>`;
      html += `<div class="rea-city-compare-item${cls}">${link}<strong>${Math.round(r.med).toLocaleString("cs-CZ")} Kč/m²</strong></div>`;
    }
    html += `</div>`;
    html += `<p class="rea-note">Medián ceny/m² z aktuálních inzerátů · aktualizováno denně</p>`;

    el.innerHTML = html;
    el.style.display = "block";
  }

  // ── Výnosnost pronájmu ───────────────────────────────────────────────────
  function renderRentalYield() {
    if (!window.REA_DEFAULT_CITY) return;
    const el = document.getElementById("rea-rental-yield");
    if (!el) return;
    const cityName  = window.REA_DEFAULT_CITY;
    const rentPm2   = CITY_RENT_PM2[cityName];
    if (!rentPm2) return;

    const pfx        = cityName.toLowerCase();
    const typeFilter = window.REA_DEFAULT_TYPE || null;
    const listings   = typeFilter
      ? activeListings.filter(l => (l.locality_city||"").toLowerCase().startsWith(pfx) && l.type === typeFilter)
      : activeListings.filter(l => (l.locality_city||"").toLowerCase().startsWith(pfx));

    const prices = listings.map(l => l.price_per_m2).filter(p => p > 0).sort((a,b) => a-b);
    if (!prices.length) return;
    const medPricePm2 = prices[Math.floor(prices.length / 2)];

    const grossYield = (rentPm2 * 12) / medPricePm2 * 100;

    let label, dot, note;
    if (grossYield < 3) {
      label = "nízký výnos"; dot = "#e53935";
      note  = "Pod hranicí inflace — ceny nemovitostí jsou vůči nájmům velmi vysoké.";
    } else if (grossYield < 4) {
      label = "podprůměrný výnos"; dot = "#fb8c00";
      note  = "Pod průměrem ČR — spíše konzervativní investice s nižším výnosem.";
    } else if (grossYield < 5) {
      label = "průměrný výnos"; dot = "#fdd835";
      note  = "Odpovídá průměru českého trhu — stabilní, ale bez výrazného zhodnocení.";
    } else if (grossYield < 7) {
      label = "dobrý výnos"; dot = "#43a047";
      note  = "Nad průměrem ČR — lokalita s dobrým poměrem ceny a nájmu.";
    } else {
      label = "výborný výnos"; dot = "#1b5e20";
      note  = "Výrazně nad průměrem — vysoký investiční potenciál.";
    }

    const typeStr = typeFilter === "byt" ? "bytů" : typeFilter === "dům" ? "domů" : "nemovitostí";

    let html = `<h2>Výnosnost pronájmu v ${cityLoc(cityName)}</h2>`;
    html += `<p>Průměrný nájem v ${cityName}: <strong>${rentPm2} Kč/m²/měsíc</strong></p>`;
    html += `<div class="rea-yield-bar">`;
    html += `<div class="rea-yield-dot" style="background:${dot};"></div>`;
    html += `<span>Hrubý výnos z pronájmu ${typeStr}: <strong>${grossYield.toFixed(1).replace(".",",")} % ročně</strong> — ${label}</span>`;
    html += `</div>`;
    html += `<p>${note}</p>`;
    html += `<p class="rea-note">Odhad vychází z průměrných nájmů (Bezrealitky, 2024) a mediánu cen aktuálních inzerátů. Nezohledňuje daně, správu, pojištění ani výpadky nájemců. Skutečný čistý výnos bývá o 1–2 % nižší.</p>`;

    el.innerHTML = html;
    el.style.display = "block";
  }

  // ── Výhody a vybavenost města ─────────────────────────────────────────────
  function renderCityInfra() {
    if (!window.REA_DEFAULT_CITY) return;
    const el = document.getElementById("rea-city-infra");
    if (!el) return;
    const cityName = window.REA_DEFAULT_CITY;
    const d = CITY_INFRA[cityName];
    if (!d) return;

    const lines = [];
    if (d.trainMin !== null && d.trainMin !== undefined) {
      lines.push(`🚆 <strong>Vlak do Prahy:</strong> přibližně ${d.trainMin} minut`);
    }
    if (d.highway) {
      lines.push(`🛣️ <strong>Dálniční napojení:</strong> ${d.highway}`);
    }
    lines.push(d.football
      ? `⚽ <strong>Prvoligový fotbalový klub:</strong> ${d.football}`
      : `⚽ <strong>Prvoligový fotbalový klub:</strong> není`);
    lines.push(`🏥 <strong>Počet nemocnic:</strong> ${d.hospitals}`);
    lines.push(`🎓 <strong>Počet středních škol:</strong> ${d.highSchools}`);
    lines.push(`🏛️ <strong>Počet vysokých škol:</strong> ${d.universities}`);
    lines.push(`🎭 <strong>Počet kin a divadel:</strong> ${d.cinemaTheatre}`);

    let html = `<h2>Výhody města ${cityName}</h2>`;
    html += lines.map(l => `<p>${l}</p>`).join("\n");

    el.style.display = "block";
  }

  // ── Vývoj cen (SVG čárový graf z price_history.json) ────────────────────────
  function renderPriceHistory() {
    if (!priceHistory || !window.REA_DEFAULT_CITY) return;
    const el = document.getElementById("rea-price-history");
    if (!el) return;
    const cityName  = window.REA_DEFAULT_CITY;
    const typeFilter = window.REA_DEFAULT_TYPE || null;
    const key = typeFilter === "byt" ? "byty" : typeFilter === "dům" ? "domy" : "celkem";

    // Posledních 90 dní s daty pro dané město a klíč
    const pts = (priceHistory.days || [])
      .filter(d => d.cities && d.cities[cityName] && d.cities[cityName][key] != null)
      .slice(-90)
      .map(d => ({ date: d.date, val: d.cities[cityName][key] }));

    if (pts.length < 2) return;

    const W = 600, H = 180, PAD = { top: 16, right: 16, bottom: 28, left: 62 };
    const vals = pts.map(p => p.val);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    const rangeV = maxV - minV || 1;
    const toX = i  => PAD.left + (i / (pts.length - 1)) * (W - PAD.left - PAD.right);
    const toY = v  => PAD.top  + (1 - (v - minV) / rangeV) * (H - PAD.top - PAD.bottom);
    const fmt = v  => Math.round(v).toLocaleString("cs-CZ");

    // Polyline body
    const polyPts = pts.map((p, i) => `${toX(i).toFixed(1)},${toY(p.val).toFixed(1)}`).join(" ");

    // Y-osa: 4 labely
    const yTicks = [minV, minV + rangeV/3, minV + 2*rangeV/3, maxV];
    const yLines = yTicks.map(v => {
      const y = toY(v).toFixed(1);
      return `<line x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}" stroke="#eee" stroke-width="1"/>
              <text x="${PAD.left - 4}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="#999">${fmt(v)}</text>`;
    }).join("\n");

    // X-osa: začátek a konec
    const dateFirst = pts[0].date.slice(5);   // MM-DD
    const dateLast  = pts[pts.length-1].date.slice(5);
    const xLabels = `
      <text x="${toX(0).toFixed(1)}" y="${H - 4}" text-anchor="middle" font-size="10" fill="#999">${dateFirst}</text>
      <text x="${toX(pts.length-1).toFixed(1)}" y="${H - 4}" text-anchor="middle" font-size="10" fill="#999">${dateLast}</text>`;

    // Aktuální hodnota — tečka na posledním bodu
    const lx = toX(pts.length - 1), ly = toY(vals[vals.length - 1]);
    const lastDot = `<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="4" fill="#C8102E"/>`;
    const lastLabel = `<text x="${(lx + 6).toFixed(1)}" y="${(ly + 4).toFixed(1)}" font-size="11" font-weight="bold" fill="#C8102E">${fmt(vals[vals.length-1])} Kč</text>`;

    const typeStr = typeFilter === "byt" ? "bytů" : typeFilter === "dům" ? "domů" : "nemovitostí";
    let html = `<h2>Vývoj cen ${typeStr} v ${cityLoc(cityName)}</h2>`;
    html += `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto;display:block;overflow:visible;" xmlns="http://www.w3.org/2000/svg">`;
    html += yLines;
    html += xLabels;
    html += `<polyline points="${polyPts}" fill="none" stroke="#C8102E" stroke-width="2" stroke-linejoin="round"/>`;
    html += lastDot + lastLabel;
    html += `</svg>`;
    html += `<p class="rea-note">Medián ceny/m² dle aktuálních inzerátů · aktualizováno denně · historická data od spuštění sledování</p>`;

    el.innerHTML = html;
    el.style.display = "block";
  }

  async function loadAll() {
    const [feedResp, archResp, histResp] = await Promise.allSettled([
      fetch(FEED_URL),
      fetch(ARCHIVE_URL),
      fetch(HISTORY_URL),
    ]);

    if (histResp.status === "fulfilled" && histResp.value.ok) {
      priceHistory = await histResp.value.json();
    }

    if (feedResp.status === "fulfilled" && feedResp.value.ok) {
      const data = await feedResp.value.json();
      activeListings = data.listings || [];
      if (data.updated) {
        const d = new Date(data.updated);
        document.getElementById("rea-updated").textContent =
          "Data ze Sreality.cz · aktualizováno " + d.toLocaleString("cs-CZ");
      }
    } else {
      document.getElementById("rea-grid").innerHTML =
        '<div class="rea-error">Nepodařilo se načíst data.</div>';
      return;
    }

    if (archResp.status === "fulfilled" && archResp.value.ok) {
      archivedListings = (await archResp.value.json()).listings || [];
    }

    if (activeListings.length > 0) {
      maxPrice = Math.max(...activeListings.map(l => l.price));
      const sl = document.getElementById("rea-f-price");
      sl.max = maxPrice; sl.value = maxPrice;
      updatePriceLabel(maxPrice);
    }

    populateFilters();
    applyUrlParams();
    render();
    renderCityInfo();
    renderNeighborCompare();
    renderRentalYield();
    renderCityInfra();
    renderPriceHistory();
  }

  // ── Filtry ───────────────────────────────────────────────────

  function cityMedians() {
    const map = {};
    activeListings.forEach(l => {
      if (!l.locality_city) return;
      if (!map[l.locality_city]) map[l.locality_city] = [];
      map[l.locality_city].push(l.price_per_m2);
    });
    const result = {};
    Object.entries(map).forEach(([city, prices]) => {
      const s = [...prices].sort((a, b) => a - b);
      const mid = Math.floor(s.length / 2);
      result[city] = s.length % 2 ? s[mid] : Math.round((s[mid - 1] + s[mid]) / 2);
    });
    return result;
  }

  function populateFilters() {
    const dispositions = [...new Set(activeListings.map(l => l.disposition))].sort();
    const cities       = [...new Set(activeListings.map(l => l.locality_city).filter(Boolean))].sort();
    const extras       = [...new Set(activeListings.flatMap(l => l.extras || []))].sort();
    fillSelect("rea-f-disp",  dispositions);
    fillSelect("rea-f-extra", extras);

    // Města — optgroup: s vlastní stránkou první (tučně), ostatní pod nimi
    const medians = cityMedians();
    const sel = document.getElementById("rea-f-city");
    const mkOpt = city => {
      const o = document.createElement("option");
      o.value = city;
      const med = medians[city];
      o.textContent = med ? `${city} (${med.toLocaleString("cs-CZ")} Kč/m²)` : city;
      return o;
    };
    const withPage    = cities.filter(c => CITY_PAGES.includes(c));
    const withoutPage = cities.filter(c => !CITY_PAGES.includes(c));
    if (withPage.length) {
      const g = document.createElement("optgroup");
      g.label = "── Města s vlastní stránkou ──";
      withPage.forEach(c => g.appendChild(mkOpt(c)));
      sel.appendChild(g);
    }
    if (withoutPage.length) {
      const g = document.createElement("optgroup");
      g.label = "── Ostatní lokality ──";
      withoutPage.forEach(c => g.appendChild(mkOpt(c)));
      sel.appendChild(g);
    }
  }

  function fillSelect(id, values) {
    const sel = document.getElementById(id);
    values.forEach(v => {
      const o = document.createElement("option");
      o.value = v; o.textContent = v; sel.appendChild(o);
    });
  }

  // Města s vlastní WP stránkou (/real/[slug]/) — pro navigaci z dropdownu
  const CITY_PAGES = [
    "Praha","Brno","Ostrava","Plzeň","Liberec","Olomouc","České Budějovice",
    "Hradec Králové","Pardubice","Zlín","Ústí nad Labem","Kladno","Most",
    "Opava","Karviná","Frýdek-Místek","Jihlava","Teplice","Děčín","Chomutov",
    "Přerov","Havířov","Mladá Boleslav","Prostějov","Znojmo","Třebíč",
    "Kolín","Příbram","Trutnov","Cheb",
    "Jablonec nad Nisou","Tábor","Česká Lípa","Třinec","Šumperk",
    "Kroměříž","Uherské Hradiště","Vsetín","Hodonín","Sokolov",
    "Nový Jičín","Písek","Břeclav","Krnov","Kopřivnice","Karlovy Vary"
  ];

  function cityToSlug(city) {
    return city.toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
  }

  function findCityPage(selected) {
    const lc = selected.toLowerCase();
    return CITY_PAGES.find(c => lc === c.toLowerCase() || lc.startsWith(c.toLowerCase() + " "));
  }

  // ── Filtrové podstránky (typ, dispozice, vybavení, vlastnictví) ──
  function slugify(s) {
    return s.toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
  }

  const TYPE_PAGES  = ["byt", "dům"];
  const DISP_PAGES  = ["1+kk","1+1","2+kk","2+1","3+kk","3+1","4+kk","4+1","5+kk","5+1","ostatní"];
  const EXTRA_PAGES = ["Balkón","Garáž","Lodžie","Novostavba","Parkování","Sklep","Terasa","Výtah","Zařízeno","Částečně zařízeno"];
  const OWN_PAGES   = ["Osobní","Družstevní"];

  function typeToSlug(t)  { return ({byt:"byty","dům":"domy"})[t] || slugify(t); }
  function dispToSlug(d)  { return slugify(d.replace(/\+/g, "-")); }
  function extraToSlug(e) { return slugify(e); }
  function ownToSlug(o)   { return ({Osobní:"osobni",Družstevní:"druzstevni"})[o] || slugify(o); }

  function findTypePage(v)  { return TYPE_PAGES.find(x => x.toLowerCase() === (v||"").toLowerCase()); }
  function findDispPage(v)  { return DISP_PAGES.find(x => x.toLowerCase() === (v||"").toLowerCase()); }
  function findExtraPage(v) { return EXTRA_PAGES.find(x => x.toLowerCase() === (v||"").toLowerCase()); }
  function findOwnPage(v)   { return OWN_PAGES.find(x => x.toLowerCase() === (v||"").toLowerCase()); }

  function applyUrlParams() {
    const p = new URLSearchParams(window.location.search);
    const pathMatch = window.location.pathname.match(/\/real\/([^\/]+)\/?$/i);
    const cityFromPath = pathMatch
      ? decodeURIComponent(pathMatch[1]).replace(/-/g, " ") : null;
    // REA_DEFAULT_CITY má přednost — obsahuje správný název s diakritikou
    const cityVal = (window.REA_DEFAULT_CITY || "") || cityFromPath || p.get("mesto") || "";
    if (cityVal) {
      const sel  = document.getElementById("rea-f-city");
      const opts = [...sel.options].map(o => o.value);
      const exactMatch = opts.find(o => o.toLowerCase() === cityVal.toLowerCase());
      if (exactMatch) {
        sel.value = exactMatch;
        cityPrefixFilter = "";
      } else if (opts.some(o => o.toLowerCase().startsWith(cityVal.toLowerCase()))) {
        cityPrefixFilter = cityVal.toLowerCase();
        const o = document.createElement("option");
        o.value = "__prefix__"; o.textContent = cityVal + " (vše)";
        sel.insertBefore(o, sel.options[1]);
        sel.value = "__prefix__";
      } else if (window.REA_DEFAULT_CITY) {
        // Město je nastaveno ale není v inzerátech → přidej syntetickou volbu, zobraz 0 výsledků
        const o = document.createElement("option");
        o.value = cityVal; o.textContent = cityVal + " (žádné inzeráty)";
        sel.insertBefore(o, sel.options[1]);
        sel.value = cityVal;
      }
    }
    // REA_DEFAULT_* pro filtrové podstránky (mají přednost před URL params)
    if (window.REA_DEFAULT_TYPE)  document.getElementById("rea-f-type").value  = window.REA_DEFAULT_TYPE;
    if (window.REA_DEFAULT_DISP)  document.getElementById("rea-f-disp").value  = window.REA_DEFAULT_DISP;
    if (window.REA_DEFAULT_EXTRA) document.getElementById("rea-f-extra").value = window.REA_DEFAULT_EXTRA;
    if (window.REA_DEFAULT_OWN)   document.getElementById("rea-f-own").value   = window.REA_DEFAULT_OWN;
    if (p.get("dispozice")) document.getElementById("rea-f-disp").value = p.get("dispozice");
    if (p.get("typ"))       document.getElementById("rea-f-type").value = p.get("typ");
    if (p.get("max_cena")) {
      const v = parseInt(p.get("max_cena"));
      document.getElementById("rea-f-price").value = v;
      updatePriceLabel(v);
    }
  }

  function getFilters() {
    return {
      disp:     document.getElementById("rea-f-disp").value,
      city:     document.getElementById("rea-f-city").value,
      type:     document.getElementById("rea-f-type").value,
      own:      document.getElementById("rea-f-own").value,
      extra:    document.getElementById("rea-f-extra").value,
      maxPrice: parseInt(document.getElementById("rea-f-price").value),
    };
  }

  function filterListings(list) {
    const f = getFilters();
    return list.filter(l => {
      if (f.disp  && l.disposition   !== f.disp)  return false;
      if (f.city === "__prefix__") {
        if (!(l.locality_city||"").toLowerCase().startsWith(cityPrefixFilter)) return false;
      } else if (f.city && l.locality_city !== f.city) return false;
      if (f.type  && l.type          !== f.type)  return false;
      if (f.own   && l.ownership     !== f.own)   return false;
      if (f.extra && !(l.extras||[]).includes(f.extra)
                  && l.building_type !== f.extra
                  && l.ownership     !== f.extra) return false;
      if (l.price <= 1) return false;
      if (l.price > f.maxPrice) return false;
      return true;
    });
  }

  // ── Aktivní filtry (chipy) ────────────────────────────────────

  function renderChips() {
    const f = getFilters();
    const c = document.getElementById("rea-active-filters");
    c.innerHTML = "";
    const map = {
      type:  "rea-f-type",  disp: "rea-f-disp",
      city:  "rea-f-city",  own:  "rea-f-own",  extra: "rea-f-extra",
    };
    const vals = { type: f.type, disp: f.disp, city: f.city, own: f.own, extra: f.extra };
    Object.entries(vals).forEach(([k, v]) => {
      if (!v) return;
      const ch = document.createElement("span");
      ch.className = "rea-filter-chip";
      ch.textContent = v + " ✕";
      ch.onclick = () => {
        if (k === "city" && window.REA_DEFAULT_CITY) {
          if (window.REA_DEFAULT_TYPE) {
            const tp = findTypePage(window.REA_DEFAULT_TYPE);
            if (tp) { window.location.href = "/real/" + typeToSlug(tp) + "/"; return; }
          }
          window.location.href = "/real/"; return;
        }
        if (k === "type" && window.REA_DEFAULT_TYPE) {
          if (window.REA_DEFAULT_CITY) {
            const cp = findCityPage(window.REA_DEFAULT_CITY);
            if (cp) { window.location.href = "/real/" + cityToSlug(cp) + "/"; return; }
          }
          window.location.href = "/real/"; return;
        }
        if (k === "disp"  && window.REA_DEFAULT_DISP)  { window.location.href = "/real/"; return; }
        if (k === "extra" && window.REA_DEFAULT_EXTRA) { window.location.href = "/real/"; return; }
        if (k === "own"   && window.REA_DEFAULT_OWN)   { window.location.href = "/real/"; return; }
        document.getElementById(map[k]).value = ""; render();
      };
      c.appendChild(ch);
    });
  }

  // ── Renderování ──────────────────────────────────────────────

  function render() {
    const list     = currentTab === "active" ? activeListings : archivedListings;
    const filtered = filterListings(list);
    // ── Řazení výsledků ─────────────────────────────────────
    const sortVal = document.getElementById("rea-sort")?.value || "score";
    const sorted  = [...filtered];
    switch (sortVal) {
      case "price_asc":  sorted.sort((a,b) => a.price - b.price); break;
      case "price_desc": sorted.sort((a,b) => b.price - a.price); break;
      case "pm2_asc":    sorted.sort((a,b) => (a.price_per_m2||0) - (b.price_per_m2||0)); break;
      case "pm2_desc":   sorted.sort((a,b) => (b.price_per_m2||0) - (a.price_per_m2||0)); break;
      case "area_desc":  sorted.sort((a,b) => (b.area||0) - (a.area||0)); break;
      case "newest":     sorted.sort((a,b) => new Date(b.scraped_at||0) - new Date(a.scraped_at||0)); break;
      default:           sorted.sort((a,b) => (b.score||0) - (a.score||0)); break;
    }

    const grid     = document.getElementById("rea-grid");
    const stats    = document.getElementById("rea-stats");
    renderChips();

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="rea-empty">Žádné inzeráty neodpovídají filtru.</div>';
      stats.innerHTML = ""; return;
    }

    const výhodné = filtered.filter(l => l.score >= 10).length;
    stats.innerHTML = `Zobrazeno <strong>${filtered.length}</strong> inzerátů`
      + (výhodné ? ` · <strong>${výhodné}</strong> výhodných (10 %+ pod trhem)` : "");
    grid.innerHTML = sorted.map((l, idx) => cardHTML(l, currentTab === "sold", idx)).join("");
  }

  function cardHTML(l, sold, idx) {
    const sc = l.score || 0;
    const scoreText = sc > 0
      ? `${sc.toFixed(1)} % pod trhem`
      : sc < 0 ? `${Math.abs(sc).toFixed(1)} % nad trhem` : "Průměr trhu";
    const badgeCls = sc >= 10 ? "good" : sc >= 0 ? "avg" : "bad";
    const badgeTxt = scoreText;

    const price = l.price.toLocaleString("cs-CZ") + " Kč";
    const pm2   = l.price_per_m2.toLocaleString("cs-CZ") + " Kč/m²";

    const soldRow = sold && l.sold_at
      ? `<div class="rea-info-row"><span class="rea-lbl">📦 Prodáno/Staženo</span><span class="rea-val">${new Date(l.sold_at).getFullYear()}</span></div>` : "";

    const f = getFilters();
    const allTags = [];
    if (l.building_type) allTags.push({ label: l.building_type, filter: "extra", value: l.building_type });
    if (l.ownership)     allTags.push({ label: l.ownership,     filter: "own",   value: l.ownership });
    (l.extras || []).forEach(e => allTags.push({ label: e, filter: "extra", value: e }));

    const tagsHTML = allTags.length
      ? `<div class="rea-extras">${allTags.map(t => {
          const isActive = (t.filter === "own"   && f.own   === t.value)
                        || (t.filter === "extra" && f.extra === t.value);
          return `<span class="rea-tag${isActive ? " active-tag" : ""}"
            onclick="reaTagClick('${esc(t.filter)}','${esc(t.value)}')"
          >${esc(t.label)}</span>`;
        }).join("")}</div>` : "";

    const oppBadge = (!sold && idx < 5)
      ? `<span class="rea-opportunity-badge">⭐ Příležitost dne</span>` : "";

    const scrapedDate = l.scraped_at
      ? new Date(l.scraped_at).toLocaleDateString("cs-CZ", { day: "numeric", month: "numeric", year: "numeric" })
      : "";

    return `
      <div class="rea-card${sold ? " sold" : ""}">
        <div class="rea-card-header">
          <div class="rea-card-badges">
            ${oppBadge ? `<div style="margin-bottom:4px">${oppBadge}</div>` : ""}
            <span class="rea-score-badge ${badgeCls}">${badgeTxt}</span>
          </div>
          ${scrapedDate ? `<span class="rea-scraped">Přidáno ${scrapedDate}</span>` : ""}
        </div>
        <div class="rea-title">${esc(l.title)}</div>
        <div class="rea-info">
          <div class="rea-info-row"><span class="rea-lbl">📍 Lokalita</span><span class="rea-val">${esc(l.locality)}</span></div>
          <div class="rea-info-row"><span class="rea-lbl">📐 Plocha</span><span class="rea-val">${l.area} m²</span></div>
          <div class="rea-info-row rea-price-row"><span class="rea-lbl">💰 Cena</span><span class="rea-val">${price}</span></div>
          <div class="rea-info-row rea-pm2-row"><span class="rea-lbl">📊 Cena/m²</span><span class="rea-val">${pm2}${l.median_price_per_m2 ? ` <span class="rea-median">(trh: ${l.median_price_per_m2.toLocaleString("cs-CZ")} Kč/m²)</span>` : ""}</span></div>
          ${soldRow}
        </div>
        ${tagsHTML}
        <a class="rea-link${sold ? " sold-link" : ""}"
           href="${esc(l.url)}" target="_blank" rel="noopener">
          ${sold ? "Archiv Sreality →" : "Prohlédnout inzerát →"}
        </a>
      </div>`;
  }

  function esc(s) {
    return String(s || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  // ── Klik na tag → filtr ───────────────────────────────────────

  window.reaTagClick = function(filterKey, value) {
    const ids = { extra: "rea-f-extra", own: "rea-f-own" };
    const sel = document.getElementById(ids[filterKey]);
    if (sel) { sel.value = sel.value === value ? "" : value; render(); }
  };

  // ── Ovládání ─────────────────────────────────────────────────

  window.reaTab = function(tab, btn) {
    currentTab = tab;
    document.querySelectorAll(".rea-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  };

  window.reaReset = function() {
    cityPrefixFilter = "";
    ["rea-f-type","rea-f-disp","rea-f-city","rea-f-own","rea-f-extra"]
      .forEach(id => document.getElementById(id).value = "");
    const sl = document.getElementById("rea-f-price");
    sl.value = maxPrice; updatePriceLabel(maxPrice);
    render();
  };

  function updatePriceLabel(val) {
    document.getElementById("rea-price-val").textContent =
      parseInt(val).toLocaleString("cs-CZ") + " Kč";
  }

  // Typ — navigace na podstránku (s kontextem města → kombinace /real/byty/brno/)
  document.getElementById("rea-f-type").addEventListener("change", function() {
    if (this.value) {
      const p = findTypePage(this.value);
      if (p) {
        if (window.REA_DEFAULT_CITY) {
          const cp = findCityPage(window.REA_DEFAULT_CITY);
          if (cp) { window.location.href = "/real/" + typeToSlug(p) + "/" + cityToSlug(cp) + "/"; return; }
        }
        window.location.href = "/real/" + typeToSlug(p) + "/"; return;
      }
    }
    render();
  });

  // Město — navigační logika:
  //   Na filter stránce (disp/extra/own) → vždy JS filtr, nikdy navigace
  //   Na city stránce + výběr bez vlastní stránky → přejdi na /real/
  //   Jinak → naviguj na city stránku (s typem pokud je nastaven)
  document.getElementById("rea-f-city").addEventListener("change", function() {
    if (this.value && this.value !== "__prefix__") {
      const page = findCityPage(this.value);
      if (page) {
        // Má vlastní stránku, ale jsme na filter stránce (disp/extra/own) → jen JS filtr
        if (window.REA_DEFAULT_DISP || window.REA_DEFAULT_EXTRA || window.REA_DEFAULT_OWN) {
          render(); return;
        }
        // Naviguj na stránku města (případně s typem)
        if (window.REA_DEFAULT_TYPE) {
          const tp = findTypePage(window.REA_DEFAULT_TYPE);
          if (tp) { window.location.href = "/real/" + typeToSlug(tp) + "/" + cityToSlug(page) + "/"; return; }
        }
        window.location.href = "/real/" + cityToSlug(page) + "/"; return;
      } else {
        // Nemá vlastní stránku
        if (window.REA_DEFAULT_CITY) {
          // Jsme na city stránce → přejdi na /real/ (nelze filtrovat bez stránky)
          window.location.href = "/real/"; return;
        }
        // Na hlavní nebo filter stránce → JS filtr v místě
      }
    }
    render();
  });

  // Dispozice — navigace na filtrovou podstránku
  document.getElementById("rea-f-disp").addEventListener("change", function() {
    if (this.value) {
      const p = findDispPage(this.value);
      if (p) { window.location.href = "/real/" + dispToSlug(p) + "/"; return; }
    }
    render();
  });

  // Vybavení — navigace na filtrovou podstránku
  document.getElementById("rea-f-extra").addEventListener("change", function() {
    if (this.value) {
      const p = findExtraPage(this.value);
      if (p) { window.location.href = "/real/" + extraToSlug(p) + "/"; return; }
    }
    render();
  });

  // Vlastnictví — navigace na filtrovou podstránku
  document.getElementById("rea-f-own").addEventListener("change", function() {
    if (this.value) {
      const p = findOwnPage(this.value);
      if (p) { window.location.href = "/real/" + ownToSlug(p) + "/"; return; }
    }
    render();
  });

  document.getElementById("rea-f-price").addEventListener("input", function() {
    updatePriceLabel(this.value); render();
  });
  document.getElementById("rea-sort").addEventListener("change", render);

  loadAll();
})();
</script>
</body>
</html>
